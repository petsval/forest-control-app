services:
  - type: web
    name: metsaveo-kontroll
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: metsaveo-data
      mountPath: /var/data
      sizeGB: 1
